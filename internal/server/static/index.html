<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture · access control</title>
    <!--
      Vendored, committed pre-built blobs (no node build). See vendor/README.md
      for versions + regeneration. bera.css is the authoritative BERA styling;
      Tailwind/DaisyUI are available to later domain screens.
    -->
    <link rel="stylesheet" href="/css/bera.css" />
    <script defer src="/js/app.js"></script>
    <script defer src="/js/transfer.js"></script>
    <script defer src="/js/crud.js"></script>
    <script defer src="/js/grants.js"></script>
    <script defer src="/js/audit.js"></script>
    <script defer src="/js/whatif.js"></script>
    <script defer src="/js/portability.js"></script>
    <script defer src="/js/rules-serializer.js"></script>
    <script defer src="/js/rules.js"></script>
    <script defer src="/js/graph.js"></script>
    <script defer src="/vendor/alpine.min.js"></script>
  </head>
  <body>
    <!--
      Lucide icon sprite (stroke-only, 1.5px per BERA §7). Inlined so the binary
      stays self-contained — no icon CDN, no icon JS. Add symbols here as the nav
      grows; reference with <use href="#icon-…">.
    -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <symbol id="icon-aperture" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="14.31" x2="20.05" y1="8" y2="17.94" />
            <line x1="9.69" x2="21.17" y1="8" y2="8" />
            <line x1="7.38" x2="13.12" y1="12" y2="2.06" />
            <line x1="9.69" x2="3.95" y1="16" y2="6.06" />
            <line x1="14.31" x2="2.83" y1="16" y2="16" />
            <line x1="16.62" x2="10.88" y1="12" y2="21.94" />
          </symbol>
          <symbol id="icon-crud" viewBox="0 0 24 24">
            <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" />
            <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65" />
            <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65" />
          </symbol>
          <symbol id="icon-grants" viewBox="0 0 24 24">
            <path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 0 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z" />
            <circle cx="16.5" cy="7.5" r=".5" fill="currentColor" />
          </symbol>
          <symbol id="icon-audit" viewBox="0 0 24 24">
            <path d="M15 12h-5" />
            <path d="M15 8h-5" />
            <path d="M19 17V5a2 2 0 0 0-2-2H4" />
            <path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3" />
          </symbol>
          <symbol id="icon-rules" viewBox="0 0 24 24">
            <rect width="8" height="8" x="3" y="3" rx="2" />
            <path d="M7 11v4a2 2 0 0 0 2 2h4" />
            <rect width="8" height="8" x="13" y="13" rx="2" />
          </symbol>
          <symbol id="icon-whatif" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <path d="M12 17h.01" />
          </symbol>
          <symbol id="icon-portability" viewBox="0 0 24 24">
            <path d="M12 3v12" />
            <path d="m8 11 4 4 4-4" />
            <path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4" />
          </symbol>
          <symbol id="icon-graph" viewBox="0 0 24 24">
            <circle cx="5" cy="6" r="2.5" />
            <circle cx="19" cy="6" r="2.5" />
            <circle cx="12" cy="18" r="2.5" />
            <path d="M7 7.2 10.4 16M17 7.2 13.6 16M7.4 6h9.2" />
          </symbol>
        </g>
      </defs>
    </svg>

    <div x-data="shell()" x-cloak>
      <div class="shell">
        <!-- Fixed left sidebar (~232px) -->
        <aside class="shell__sidebar">
          <div class="shell__brand">
            <span class="shell__brand-mark">
              <svg width="14" height="14"><use href="#icon-aperture" /></svg>
            </span>
            <span class="shell__wordmark">Aperture</span>
          </div>
          <nav class="shell__nav">
            <div class="shell__nav-group">
              <div class="shell__nav-heading">Access control</div>
              <template x-for="section in sections" :key="section.id">
                <a
                  class="bera-nav-item"
                  :class="{ 'bera-nav-item--active': active === section.id }"
                  :href="section.route"
                >
                  <svg><use :href="'#icon-' + section.id" /></svg>
                  <span x-text="section.label"></span>
                </a>
              </template>
            </div>
          </nav>
        </aside>

        <!-- Top utility bar (~52px) -->
        <header class="shell__topbar">
          <span class="shell__topbar-title" x-text="activeSection.label"></span>
          <div class="shell__topbar-spacer"></div>
          <template x-if="signedIn">
            <div class="shell__identity">
              <span>Signed in as</span>
              <span class="shell__identity-id" x-text="principal"></span>
              <button class="bera-btn bera-btn--secondary" @click="signOut()">Sign out</button>
            </div>
          </template>
        </header>

        <!-- Flex content area. The Model (crud) section is filled by E6-S2; the
             other sections keep the shell placeholder until their story lands. -->
        <main class="shell__content">
          <!-- Model management (E6-S2): principals, roles, groups, permissions,
               object types + their typed action sets. Its own Alpine scope. -->
          <div x-show="active === 'crud'" x-data="crud()">
            <div class="bera-section-head">
              <h1 class="bera-h3">Model</h1>
            </div>

            <!-- Not signed in: factual gate, no editing surface. -->
            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to manage the model.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <!-- Tier gate: read-only viewers are told why editing is hidden. -->
                <template x-if="tierChecked && !canEdit">
                  <div class="bera-alert bera-alert--info">
                    <span>
                      You are signed in as <span class="bera-mono" x-text="principal"></span>.
                      Editing the model requires system-admin authority; you have read-only access.
                    </span>
                  </div>
                </template>

                <div class="bera-toolbar">
                  <div class="bera-tabs">
                    <template x-for="t in types" :key="t.key">
                      <button
                        class="bera-tab"
                        :class="{ 'bera-tab--active': activeType === t.key }"
                        @click="selectType(t.key)"
                        x-text="t.label"
                      ></button>
                    </template>
                  </div>
                  <div class="bera-toolbar__spacer"></div>
                  <button class="bera-btn bera-btn--secondary" @click="addFilter()">Add filter</button>
                  <button class="bera-btn bera-btn--secondary" @click="load()">Reload</button>
                  <button
                    class="bera-btn bera-btn--primary"
                    x-show="canEdit"
                    @click="openCreate()"
                    x-text="'New ' + currentType.singular"
                  ></button>
                </div>

                <!-- Server-side filter bar: each row is a predicate sent to the
                     List RPC so the SERVER returns only matching entities. -->
                <div class="bera-filterbar" x-show="filters.length > 0">
                  <div class="bera-filterbar__match">
                    <span class="bera-caption">Match</span>
                    <select class="bera-select" style="width:auto" x-model="filterMatch" @change="load()">
                      <option value="all">all</option>
                      <option value="any">any</option>
                    </select>
                    <span class="bera-caption">of:</span>
                  </div>
                  <template x-for="(f, i) in filters" :key="i">
                    <div class="bera-filterrow">
                      <select class="bera-select" x-model="f.field" @change="load()">
                        <template x-for="col in currentType.columns" :key="col.key">
                          <option :value="col.key" x-text="col.label"></option>
                        </template>
                      </select>
                      <select class="bera-select" style="width:auto" x-model="f.op" @change="load()">
                        <option value="contains">contains</option>
                        <option value="eq">equals</option>
                        <option value="starts">starts with</option>
                        <option value="empty">is empty</option>
                      </select>
                      <input class="bera-input" style="width:150px" x-model="f.value"
                             x-show="filterNeedsValue(f.op)"
                             placeholder="value" @keydown.enter="load()" @blur="load()" />
                      <button class="bera-iconbtn" title="Remove" @click="removeFilter(i)">✕</button>
                    </div>
                  </template>
                  <button class="bera-btn bera-btn--secondary" @click="addFilter()">+ condition</button>
                  <button class="bera-btn bera-btn--secondary" @click="clearFilters(); load()">Clear</button>
                </div>

                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>

                <template x-if="loading">
                  <p class="bera-body bera-muted">Loading.</p>
                </template>

                <template x-if="!loading && !error && rows.length === 0">
                  <div class="bera-empty">
                    <p class="bera-body" x-text="emptyText()"></p>
                  </div>
                </template>

                <template x-if="!loading && rows.length > 0">
                  <div class="bera-table-wrap">
                    <table class="bera-table">
                      <thead>
                        <tr>
                          <template x-for="col in currentType.columns" :key="col.key">
                            <th x-text="col.label"></th>
                          </template>
                          <th style="text-align: right">Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="row in rows" :key="rowId(row)">
                          <tr>
                            <template x-for="col in currentType.columns" :key="col.key">
                              <td :class="col.mono ? 'bera-cell-mono' : ''">
                                <template x-if="col.badge">
                                  <span
                                    class="bera-badge"
                                    :class="'bera-badge--' + String(row[col.key] || '').toLowerCase()"
                                    x-text="row[col.key] || '—'"
                                  ></span>
                                </template>
                                <template x-if="!col.badge">
                                  <span x-text="cellText(row, col)"></span>
                                </template>
                              </td>
                            </template>
                            <td style="text-align: right">
                              <template x-if="canEdit">
                                <span class="bera-row-actions">
                                  <template x-if="currentType.manageMembers">
                                    <button class="bera-linkbtn" @click="openMembers(row)">Members</button>
                                  </template>
                                  <button class="bera-linkbtn" @click="openEdit(row)">Edit</button>
                                  <button class="bera-linkbtn bera-linkbtn--danger" @click="askDelete(row)">Delete</button>
                                </span>
                              </template>
                              <template x-if="!canEdit">
                                <span class="bera-muted">—</span>
                              </template>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </template>

                <!-- Create / edit modal -->
                <template x-if="modal.open">
                  <div class="bera-scrim" @keydown.escape.window="closeModal()">
                    <div class="bera-modal__panel">
                      <h2 class="bera-modal__title" x-text="(modal.mode === 'create' ? 'New ' : 'Edit ') + currentType.singular"></h2>
                      <p class="bera-caption" style="margin-bottom: 16px">Fields are validated against the API.</p>

                      <template x-if="modal.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="modal.error.code"></span>
                          <span x-text="modal.error.msg"></span>
                        </div>
                      </template>

                      <form @submit.prevent="save()">
                        <template x-for="field in currentType.fields" :key="field.key">
                          <div class="bera-field">
                            <label class="bera-label" x-text="field.label"></label>

                            <template x-if="field.widget === 'text'">
                              <input
                                class="bera-input"
                                :class="field.mono ? 'bera-cell-mono' : ''"
                                x-model="modal.form[field.key]"
                                :placeholder="field.placeholder || ''"
                                :disabled="!!(field.lockOnEdit && modal.mode === 'edit')"
                              />
                            </template>

                            <template x-if="field.widget === 'slug'">
                              <input
                                class="bera-input"
                                :class="field.mono ? 'bera-cell-mono' : ''"
                                :value="modal.form[field.key]"
                                @input="modal.form[field.key] = slugLive($event.target.value)"
                                :placeholder="field.placeholder || ''"
                                :disabled="!!(field.lockOnEdit && modal.mode === 'edit')"
                              />
                            </template>

                            <template x-if="field.widget === 'derived'">
                              <div class="bera-derived" :class="field.mono ? 'bera-cell-mono' : ''" x-text="derivedValue(field) || '—'"></div>
                            </template>

                            <template x-if="field.widget === 'textarea'">
                              <textarea class="bera-textarea" x-model="modal.form[field.key]"></textarea>
                            </template>

                            <template x-if="field.widget === 'scopestrategy'">
                              <div>
                                <select class="bera-select" x-model="modal.scopeSel[field.key].strategy">
                                  <template x-for="o in scopeStrategyOptions()" :key="o.value">
                                    <option :value="o.value" x-text="o.label"></option>
                                  </template>
                                </select>
                                <template x-if="scopeNeedsSelection(modal.scopeSel[field.key].strategy)">
                                  <div style="margin-top: 8px">
                                    <label class="bera-label">Rule (optional)</label>
                                    <select class="bera-select" x-model="modal.scopeSel[field.key].rule">
                                      <option value="">— no rule (use an object id list) —</option>
                                      <template x-for="o in ruleOptions()" :key="o.value">
                                        <option :value="o.value" x-text="o.label"></option>
                                      </template>
                                    </select>
                                    <template x-if="!modal.scopeSel[field.key].rule">
                                      <div style="margin-top: 8px">
                                        <label class="bera-label">Object ids</label>
                                        <input
                                          class="bera-input bera-cell-mono"
                                          x-model="modal.scopeSel[field.key].ids"
                                          placeholder="account:acme/document:42, account:acme/document:99"
                                        />
                                        <p class="bera-field__hint" x-text="modal.scopeSel[field.key].strategy === 'exclusive' ? 'Comma-separated object ids to EXCLUDE from the type.' : 'Comma-separated object ids to INCLUDE.'"></p>
                                      </div>
                                    </template>
                                    <p class="bera-field__hint" x-show="modal.scopeSel[field.key].rule">Membership is decided per request by the rule.</p>
                                  </div>
                                </template>
                                <p class="bera-field__hint">Stored as: <span class="bera-cell-mono" x-text="buildScopeRef(modal.scopeSel[field.key]) || '(literal)'"></span></p>
                              </div>
                            </template>

                            <template x-if="field.widget === 'select'">
                              <select class="bera-select" x-model="modal.form[field.key]">
                                <template x-for="o in field.options" :key="o">
                                  <option :value="o" x-text="o"></option>
                                </template>
                              </select>
                            </template>

                            <template x-if="field.widget === 'refselect'">
                              <select class="bera-select" x-model="modal.form[field.key]">
                                <option value="">Select an option</option>
                                <template x-for="o in refOptions(field)" :key="o.value">
                                  <option :value="o.value" x-text="o.label"></option>
                                </template>
                              </select>
                            </template>

                            <template x-if="field.widget === 'actionselect'">
                              <select class="bera-select" x-model="modal.form[field.key]">
                                <option value="">Select an action</option>
                                <template x-for="a in actionOptions()" :key="a">
                                  <option :value="a" x-text="a"></option>
                                </template>
                              </select>
                            </template>

                            <template x-if="field.widget === 'refchecks'">
                              <div class="bera-transfer" x-data="transferList({
                                items: () => refOptions(field),
                                has: (v) => (modal.form[field.key] || []).includes(v),
                                toggle: (v) => toggleRef(field.key, v),
                              })">
                                <div class="bera-transfer__pane">
                                  <div class="bera-transfer__head">
                                    <span class="bera-transfer__title">Available</span>
                                    <button type="button" class="bera-linkbtn" x-show="available.length" @click="addAll()" x-text="'Add all (' + available.length + ')'"></button>
                                  </div>
                                  <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="availQuery" />
                                  <ul class="bera-transfer__list">
                                    <template x-if="available.length === 0">
                                      <li class="bera-transfer__empty" x-text="totalCount === 0 ? 'No options available.' : 'Nothing to add.'"></li>
                                    </template>
                                    <template x-for="o in available" :key="o.value">
                                      <li class="bera-transfer__item" @click="pick(o.value)" :title="o.label">
                                        <span class="bera-cell-mono" x-text="o.label"></span>
                                        <span class="bera-transfer__op" aria-hidden="true">+</span>
                                      </li>
                                    </template>
                                  </ul>
                                </div>
                                <div class="bera-transfer__pane">
                                  <div class="bera-transfer__head">
                                    <span class="bera-transfer__title">Selected <span class="bera-transfer__count" x-text="selectedCount"></span></span>
                                    <button type="button" class="bera-linkbtn" x-show="chosen.length" @click="removeAll()" x-text="'Clear (' + chosen.length + ')'"></button>
                                  </div>
                                  <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="selQuery" />
                                  <ul class="bera-transfer__list">
                                    <template x-if="chosen.length === 0">
                                      <li class="bera-transfer__empty" x-text="selectedCount === 0 ? 'None selected yet.' : 'No match.'"></li>
                                    </template>
                                    <template x-for="o in chosen" :key="o.value">
                                      <li class="bera-transfer__item bera-transfer__item--on" @click="pick(o.value)" :title="o.label">
                                        <span class="bera-transfer__op" aria-hidden="true">×</span>
                                        <span class="bera-cell-mono" x-text="o.label"></span>
                                      </li>
                                    </template>
                                  </ul>
                                </div>
                              </div>
                            </template>

                            <template x-if="field.widget === 'taglist'">
                              <input
                                class="bera-input bera-cell-mono"
                                x-model="modal.tagText[field.key]"
                                placeholder="read, write, delete"
                              />
                            </template>

                            <template x-if="field.widget === 'checkbox'">
                              <label class="bera-check" :class="modal.form[field.key] ? 'bera-check--on' : ''">
                                <input type="checkbox" x-model="modal.form[field.key]" />
                                <span>Delegatable</span>
                              </label>
                            </template>

                            <template x-if="field.hint">
                              <p class="bera-field__hint" x-text="field.hint"></p>
                            </template>
                          </div>
                        </template>

                        <template x-if="currentType.membership">
                          <div class="bera-field">
                            <label class="bera-label">Accounts</label>
                            <template x-if="modal.memberLoading">
                              <span class="bera-caption">Loading memberships…</span>
                            </template>
                            <template x-if="!modal.memberLoading">
                              <div class="bera-transfer" x-data="transferList({
                                items: () => accounts.map((a) => ({ value: a.ID, label: a.Name ? (a.ID + ' — ' + a.Name) : a.ID })),
                                has: (v) => !!modal.memberSel[v],
                                toggle: (v) => toggleModalAccount(v),
                              })">
                                <div class="bera-transfer__pane">
                                  <div class="bera-transfer__head">
                                    <span class="bera-transfer__title">Available</span>
                                    <button type="button" class="bera-linkbtn" x-show="available.length" @click="addAll()" x-text="'Add all (' + available.length + ')'"></button>
                                  </div>
                                  <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="availQuery" />
                                  <ul class="bera-transfer__list">
                                    <template x-if="available.length === 0">
                                      <li class="bera-transfer__empty" x-text="totalCount === 0 ? 'No accounts yet. Create one in the Accounts tab.' : 'Nothing to add.'"></li>
                                    </template>
                                    <template x-for="o in available" :key="o.value">
                                      <li class="bera-transfer__item" @click="pick(o.value)" :title="o.label">
                                        <span class="bera-cell-mono" x-text="o.label"></span>
                                        <span class="bera-transfer__op" aria-hidden="true">+</span>
                                      </li>
                                    </template>
                                  </ul>
                                </div>
                                <div class="bera-transfer__pane">
                                  <div class="bera-transfer__head">
                                    <span class="bera-transfer__title">Selected <span class="bera-transfer__count" x-text="selectedCount"></span></span>
                                    <button type="button" class="bera-linkbtn" x-show="chosen.length" @click="removeAll()" x-text="'Clear (' + chosen.length + ')'"></button>
                                  </div>
                                  <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="selQuery" />
                                  <ul class="bera-transfer__list">
                                    <template x-if="chosen.length === 0">
                                      <li class="bera-transfer__empty" x-text="selectedCount === 0 ? 'None selected yet.' : 'No match.'"></li>
                                    </template>
                                    <template x-for="o in chosen" :key="o.value">
                                      <li class="bera-transfer__item bera-transfer__item--on" @click="pick(o.value)" :title="o.label">
                                        <span class="bera-transfer__op" aria-hidden="true">×</span>
                                        <span class="bera-cell-mono" x-text="o.label"></span>
                                      </li>
                                    </template>
                                  </ul>
                                </div>
                              </div>
                            </template>
                            <p class="bera-field__hint">Accounts this principal is a member of. Saved with the principal.</p>
                          </div>
                        </template>

                        <div class="bera-modal__foot">
                          <button type="button" class="bera-btn bera-btn--secondary" @click="closeModal()">Cancel</button>
                          <button type="submit" class="bera-btn bera-btn--primary" :disabled="modal.saving" x-text="modal.saving ? 'Saving' : 'Save'"></button>
                        </div>
                      </form>
                    </div>
                  </div>
                </template>

                <!-- Account membership editor -->
                <template x-if="members.open">
                  <div class="bera-scrim" @keydown.escape.window="members.open = false">
                    <div class="bera-modal__panel">
                      <h2 class="bera-modal__title">Members of <span class="bera-cell-mono" x-text="members.account.ID"></span></h2>
                      <p class="bera-caption" style="margin-bottom: 16px">Select the principals that belong to this account.</p>

                      <template x-if="members.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="members.error.code"></span>
                          <span x-text="members.error.msg"></span>
                        </div>
                      </template>

                      <template x-if="members.loading">
                        <span class="bera-caption">Loading members…</span>
                      </template>

                      <template x-if="!members.loading">
                        <div class="bera-field">
                          <div class="bera-transfer" x-data="transferList({
                            items: () => refs.principals.map((p) => ({ value: p.ID, label: p.Identity ? (p.ID + ' — ' + p.Identity) : p.ID })),
                            has: (v) => !!members.selected[v],
                            toggle: (v) => toggleMember(v),
                          })">
                            <div class="bera-transfer__pane">
                              <div class="bera-transfer__head">
                                <span class="bera-transfer__title">Available</span>
                                <button type="button" class="bera-linkbtn" x-show="available.length" @click="addAll()" x-text="'Add all (' + available.length + ')'"></button>
                              </div>
                              <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="availQuery" />
                              <ul class="bera-transfer__list">
                                <template x-if="available.length === 0">
                                  <li class="bera-transfer__empty" x-text="totalCount === 0 ? 'No principals available.' : 'Nothing to add.'"></li>
                                </template>
                                <template x-for="o in available" :key="o.value">
                                  <li class="bera-transfer__item" @click="pick(o.value)" :title="o.label">
                                    <span class="bera-cell-mono" x-text="o.label"></span>
                                    <span class="bera-transfer__op" aria-hidden="true">+</span>
                                  </li>
                                </template>
                              </ul>
                            </div>
                            <div class="bera-transfer__pane">
                              <div class="bera-transfer__head">
                                <span class="bera-transfer__title">Members <span class="bera-transfer__count" x-text="selectedCount"></span></span>
                                <button type="button" class="bera-linkbtn" x-show="chosen.length" @click="removeAll()" x-text="'Clear (' + chosen.length + ')'"></button>
                              </div>
                              <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="selQuery" />
                              <ul class="bera-transfer__list">
                                <template x-if="chosen.length === 0">
                                  <li class="bera-transfer__empty" x-text="selectedCount === 0 ? 'No members yet.' : 'No match.'"></li>
                                </template>
                                <template x-for="o in chosen" :key="o.value">
                                  <li class="bera-transfer__item bera-transfer__item--on" @click="pick(o.value)" :title="o.label">
                                    <span class="bera-transfer__op" aria-hidden="true">×</span>
                                    <span class="bera-cell-mono" x-text="o.label"></span>
                                  </li>
                                </template>
                              </ul>
                            </div>
                          </div>
                        </div>
                      </template>

                      <div class="bera-modal__foot">
                        <button type="button" class="bera-btn bera-btn--secondary" @click="members.open = false">Cancel</button>
                        <button type="button" class="bera-btn bera-btn--primary" :disabled="members.saving || members.loading" @click="saveMembers()" x-text="members.saving ? 'Saving' : 'Save members'"></button>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- Delete confirmation (state-of-the-world) -->
                <template x-if="confirm.open">
                  <div class="bera-scrim" @keydown.escape.window="confirm.open = false">
                    <div class="bera-modal__panel" style="max-width: 460px">
                      <h2 class="bera-modal__title">Confirm deletion</h2>
                      <p class="bera-body" x-text="confirm.message"></p>
                      <template x-if="confirm.error">
                        <div class="bera-alert bera-alert--danger" style="margin-top: 16px">
                          <span class="bera-alert__code" x-text="confirm.error.code"></span>
                          <span x-text="confirm.error.msg"></span>
                        </div>
                      </template>
                      <div class="bera-modal__foot">
                        <button class="bera-btn bera-btn--secondary" @click="confirm.open = false">Cancel</button>
                        <button class="bera-btn bera-btn--primary" :disabled="confirm.deleting" @click="doDelete()" x-text="confirm.deleting ? 'Deleting' : 'Delete'"></button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Provisioning (E6-S3): grant management, template apply + bulk, and
               delegation. Its own Alpine scope over the Twirp facade. -->
          <div x-show="active === 'grants'" x-data="grants()">
            <div class="bera-section-head">
              <h1 class="bera-h3">Grants</h1>
              <span class="bera-caption">
                <template x-if="grantAccountFilter">
                  <span>Account <span class="bera-mono" x-text="grantAccountFilter"></span></span>
                </template>
                <template x-if="!grantAccountFilter"><span>All accounts</span></template>
              </span>
            </div>

            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to manage grants, templates and delegation.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <template x-if="tierChecked && !canGrant">
                  <div class="bera-alert bera-alert--info">
                    <span>
                      You are signed in as <span class="bera-mono" x-text="principal"></span>.
                      Provisioning grants requires account-admin authority in this account; you
                      have read-only access. Bestowing a delegated subset of your own grants may
                      still be permitted — the server decides.
                    </span>
                  </div>
                </template>

                <div class="bera-toolbar">
                  <div class="bera-tabs">
                    <template x-for="t in tabs" :key="t.key">
                      <button
                        class="bera-tab"
                        :class="{ 'bera-tab--active': activeTab === t.key }"
                        @click="selectTab(t.key)"
                        x-text="t.label"
                      ></button>
                    </template>
                  </div>
                  <div class="bera-toolbar__spacer"></div>
                  <button class="bera-btn bera-btn--secondary" @click="loadTab()">Reload</button>
                </div>

                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>

                <template x-if="loading">
                  <p class="bera-body bera-muted">Loading.</p>
                </template>

                <!-- ============ GRANTS TAB ============ -->
                <div x-show="activeTab === 'grants'">
                  <div class="bera-toolbar">
                    <!-- Local account filter (E1-S3): empty = all accounts;
                         choosing an account narrows to it. This is the Grants
                         view's own scope — it does NOT follow the shell switcher. -->
                    <label class="bera-field" style="display:flex;align-items:center;gap:8px;margin:0">
                      <span class="bera-caption">Account</span>
                      <select class="bera-select" style="width:auto" x-model="grantAccountFilter" @change="onGrantAccountFilterChange()">
                        <option value="">All accounts</option>
                        <template x-for="a in accounts" :key="a.ID">
                          <option :value="a.ID" x-text="a.Name ? (a.ID + ' — ' + a.Name) : a.ID"></option>
                        </template>
                      </select>
                    </label>
                    <div class="bera-toolbar__spacer"></div>
                    <button class="bera-btn bera-btn--secondary" @click="addGrantFilter()">Add filter</button>
                    <button class="bera-btn bera-btn--primary" x-show="canGrant" @click="openCreateGrant()">New grant</button>
                  </div>

                  <div class="bera-filterbar" x-show="grantFilters.length > 0">
                    <div class="bera-filterbar__match">
                      <span class="bera-caption">Match</span>
                      <select class="bera-select" style="width:auto" x-model="grantFilterMatch" @change="reloadGrants()">
                        <option value="all">all</option><option value="any">any</option>
                      </select>
                      <span class="bera-caption">of:</span>
                    </div>
                    <template x-for="(f, i) in grantFilters" :key="i">
                      <div class="bera-filterrow">
                        <select class="bera-select" x-model="f.field" @change="reloadGrants()">
                          <template x-for="col in grantCols" :key="col.key"><option :value="col.key" x-text="col.label"></option></template>
                        </select>
                        <select class="bera-select" style="width:auto" x-model="f.op" @change="reloadGrants()">
                          <option value="contains">contains</option><option value="eq">equals</option>
                          <option value="starts">starts with</option><option value="empty">is empty</option>
                        </select>
                        <input class="bera-input" style="width:150px" x-model="f.value" x-show="filterNeedsValue(f.op)"
                               placeholder="value" @keydown.enter="reloadGrants()" @blur="reloadGrants()" />
                        <button class="bera-iconbtn" title="Remove" @click="removeGrantFilter(i)">✕</button>
                      </div>
                    </template>
                    <button class="bera-btn bera-btn--secondary" @click="addGrantFilter()">+ condition</button>
                    <button class="bera-btn bera-btn--secondary" @click="clearGrantFilters()">Clear</button>
                  </div>

                  <template x-if="!loading && rows.length === 0">
                    <div class="bera-empty">
                      <p class="bera-body" x-show="!grantAccountFilter">No grants in any account yet.</p>
                      <p class="bera-body" x-show="grantAccountFilter">No grants in this account yet.</p>
                    </div>
                  </template>

                  <template x-if="!loading && rows.length > 0">
                    <div class="bera-table-wrap">
                      <table class="bera-table">
                        <thead>
                          <tr>
                            <th>Id</th><th>Account</th><th>Subject</th><th>Permission</th><th>Object</th><th>Effect</th><th>Scope strategy</th>
                            <th style="text-align: right">Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="g in rows" :key="g.ID">
                            <tr>
                              <td class="bera-cell-mono" x-text="g.ID"></td>
                              <td>
                                <template x-if="isWildcardGrant(g)"><span class="bera-cell-mono" title="Wildcard account — applies in every account">*</span></template>
                                <template x-if="!isWildcardGrant(g)"><span class="bera-cell-mono" x-text="g.AccountID"></span></template>
                              </td>
                              <td class="bera-cell-mono" x-text="subjectText(g)"></td>
                              <td class="bera-cell-mono" x-text="permLabel(g.PermissionID)"></td>
                              <td class="bera-cell-mono" x-text="g.Object"></td>
                              <td><span class="bera-badge" :class="'bera-badge--' + g.Effect" x-text="g.Effect"></span></td>
                              <td class="bera-cell-mono" x-text="permScope(g.PermissionID) || '—'"></td>
                              <td style="text-align: right">
                                <template x-if="isWildcardGrant(g) ? canDefineTemplate : canGrant">
                                  <span class="bera-row-actions">
                                    <button class="bera-linkbtn" @click="openEditGrant(g)">Edit</button>
                                    <button class="bera-linkbtn bera-linkbtn--danger" @click="askDeleteGrant(g)">Delete</button>
                                  </span>
                                </template>
                                <template x-if="!(isWildcardGrant(g) ? canDefineTemplate : canGrant)"><span class="bera-muted">—</span></template>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>

                  <!-- Pagination bar (E1-S4): count of the account's own grants
                       plus prev/next over its window. In single-account mode the
                       "*" (platform) overlay is an always-included group NOT
                       counted in the total, called out separately when present. -->
                  <div class="bera-toolbar" x-show="!loading && page.total > 0">
                    <span class="bera-caption">
                      Showing <span x-text="pageStart()"></span>–<span x-text="pageEnd()"></span>
                      of <span x-text="page.total"></span>
                      <span x-show="!grantAccountFilter"> across all accounts</span>
                      <span x-show="grantAccountFilter"> in this account</span>
                      <span class="bera-muted" x-show="page.wildcardCount > 0"
                            x-text="'  + ' + page.wildcardCount + ' platform (*) grant' + (page.wildcardCount === 1 ? '' : 's')"></span>
                    </span>
                    <div class="bera-toolbar__spacer"></div>
                    <button class="bera-btn bera-btn--secondary" :disabled="!hasPrev()" @click="prevPage()">Prev</button>
                    <button class="bera-btn bera-btn--secondary" :disabled="!hasNext()" @click="nextPage()">Next</button>
                  </div>
                </div>

                <!-- ============ TEMPLATES TAB ============ -->
                <div x-show="activeTab === 'templates'">
                  <div class="bera-toolbar">
                    <div class="bera-toolbar__spacer"></div>
                    <button class="bera-btn bera-btn--secondary" @click="addTmplFilter()">Add filter</button>
                    <button class="bera-btn bera-btn--primary" x-show="canDefineTemplate" @click="openCreateTemplate()">New template</button>
                  </div>

                  <div class="bera-filterbar" x-show="tmplFilters.length > 0">
                    <div class="bera-filterbar__match">
                      <span class="bera-caption">Match</span>
                      <select class="bera-select" style="width:auto" x-model="tmplFilterMatch" @change="loadTemplates()">
                        <option value="all">all</option><option value="any">any</option>
                      </select>
                      <span class="bera-caption">of:</span>
                    </div>
                    <template x-for="(f, i) in tmplFilters" :key="i">
                      <div class="bera-filterrow">
                        <select class="bera-select" x-model="f.field" @change="loadTemplates()">
                          <template x-for="col in tmplCols" :key="col.key"><option :value="col.key" x-text="col.label"></option></template>
                        </select>
                        <select class="bera-select" style="width:auto" x-model="f.op" @change="loadTemplates()">
                          <option value="contains">contains</option><option value="eq">equals</option>
                          <option value="starts">starts with</option><option value="empty">is empty</option>
                        </select>
                        <input class="bera-input" style="width:150px" x-model="f.value" x-show="filterNeedsValue(f.op)"
                               placeholder="value" @keydown.enter="loadTemplates()" @blur="loadTemplates()" />
                        <button class="bera-iconbtn" title="Remove" @click="removeTmplFilter(i)">✕</button>
                      </div>
                    </template>
                    <button class="bera-btn bera-btn--secondary" @click="addTmplFilter()">+ condition</button>
                    <button class="bera-btn bera-btn--secondary" @click="clearTmplFilters()">Clear</button>
                  </div>

                  <template x-if="!loading && templates.length === 0">
                    <div class="bera-empty"><p class="bera-body">No templates defined yet.</p></div>
                  </template>

                  <template x-if="!loading && templates.length > 0">
                    <div class="bera-table-wrap">
                      <table class="bera-table">
                        <thead>
                          <tr>
                            <th>Name</th><th>Version</th><th>Parameters</th><th>Grants</th><th>Description</th>
                            <th style="text-align: right">Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="t in templates" :key="t.Name + '-v' + t.Version">
                            <tr>
                              <td class="bera-cell-mono" x-text="t.Name"></td>
                              <td class="bera-cell-mono" x-text="t.Version"></td>
                              <td class="bera-cell-mono" x-text="(t.Params || []).map(p => p.Name).join(', ') || '—'"></td>
                              <td x-text="(t.Grants || []).length"></td>
                              <td x-text="t.Description || '—'"></td>
                              <td style="text-align: right">
                                <span class="bera-row-actions">
                                  <button class="bera-linkbtn" x-show="canGrant" @click="openApply(t, 'single')">Apply</button>
                                  <button class="bera-linkbtn" x-show="canGrant" @click="openApply(t, 'bulk')">Bulk apply</button>
                                  <button class="bera-linkbtn" x-show="canDefineTemplate" @click="openEditTemplate(t)">Edit</button>
                                  <button class="bera-linkbtn bera-linkbtn--danger" x-show="canDefineTemplate" @click="askDeleteTemplate(t)">Delete</button>
                                </span>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                </div>

                <!-- ============ DELEGATION TAB ============ -->
                <div x-show="activeTab === 'delegation'">
                  <p class="bera-caption" style="margin: 8px 0 12px">
                    Bestowing as <span class="bera-mono" x-text="principal"></span>. You may hand a
                    delegatable subset of your own grants to another principal, scoped to
                    <span class="bera-mono" x-text="account"></span>. The server enforces the subset,
                    delegatable and may-delegate rules.
                  </p>
                  <template x-if="tierChecked && !hasDelegateRight()">
                    <div class="bera-alert bera-alert--info">
                      <span>You hold no may-delegate right in this account, so a bestow will be
                        rejected. This is a hint; the server is the source of truth.</span>
                    </div>
                  </template>

                  <template x-if="!loading && eligibleHeld().length === 0">
                    <div class="bera-empty">
                      <p class="bera-body">You hold no delegatable grants to bestow in this account.</p>
                    </div>
                  </template>

                  <template x-if="!loading && eligibleHeld().length > 0">
                    <div class="bera-table-wrap">
                      <table class="bera-table">
                        <thead>
                          <tr>
                            <th>Held grant</th><th>Subject</th><th>Permission</th><th>Object</th>
                            <th style="text-align: right">Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="g in eligibleHeld()" :key="g.ID">
                            <tr>
                              <td class="bera-cell-mono" x-text="g.ID"></td>
                              <td class="bera-cell-mono" x-text="subjectText(g)"></td>
                              <td class="bera-cell-mono" x-text="permLabel(g.PermissionID)"></td>
                              <td class="bera-cell-mono" x-text="g.Object"></td>
                              <td style="text-align: right">
                                <span class="bera-row-actions">
                                  <button class="bera-linkbtn" @click="openBestow(g)">Bestow subset</button>
                                  <button class="bera-linkbtn bera-linkbtn--danger" @click="askRevoke(g)">Revoke</button>
                                </span>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                </div>

                <!-- ---- grant create/edit modal ---- -->
                <template x-if="grantModal.open">
                  <div class="bera-scrim" @keydown.escape.window="grantModal.open = false">
                    <div class="bera-modal__panel">
                      <h2 class="bera-modal__title" x-text="(grantModal.mode === 'create' ? 'New grant' : 'Edit grant')"></h2>
                      <p class="bera-caption" style="margin-bottom: 16px">
                        Grants are scoped to account <span class="bera-mono" x-text="account"></span>. Scope strategy is a
                        property of the referenced permission.
                      </p>
                      <template x-if="grantModal.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="grantModal.error.code"></span>
                          <span x-text="grantModal.error.msg"></span>
                        </div>
                      </template>
                      <form @submit.prevent="saveGrant()">
                        <div class="bera-field">
                          <label class="bera-label">Grant id</label>
                          <input class="bera-input bera-cell-mono" x-model="grantModal.form.ID" :disabled="grantModal.mode === 'edit'" placeholder="g-alice-doc" />
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Account</label>
                          <select class="bera-select" x-model="grantModal.form.AccountID">
                            <option value="">Select an account</option>
                            <option value="*">All accounts (*)</option>
                            <template x-for="a in accounts" :key="a.ID">
                              <option :value="a.ID" x-text="a.Name ? (a.ID + ' — ' + a.Name) : a.ID"></option>
                            </template>
                          </select>
                          <p class="bera-field__hint">The account this grant is scoped to. "All accounts (*)" spans every account and requires system-admin.</p>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Subject kind</label>
                          <select class="bera-select" x-model="grantModal.form.Subject.Kind">
                            <option value="principal">principal</option>
                            <option value="role">role</option>
                            <option value="group">group</option>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Subject</label>
                          <select class="bera-select" x-model="grantModal.form.Subject.ID">
                            <option value="">Select a subject</option>
                            <template x-for="o in subjectOptions(grantModal.form.Subject.Kind)" :key="o.ID">
                              <option :value="o.ID" x-text="o.ID + (o.Name ? ' (' + o.Name + ')' : '')"></option>
                            </template>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Scope strategy filter</label>
                          <select class="bera-select" x-model="grantModal.strategyFilter">
                            <template x-for="s in strategyOptions()" :key="s">
                              <option :value="s" x-text="s === '' ? 'Any strategy' : s"></option>
                            </template>
                          </select>
                          <p class="bera-field__hint">Narrows the permission list to permissions carrying this scope strategy.</p>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Permission</label>
                          <select class="bera-select" x-model="grantModal.form.PermissionID">
                            <option value="">Select a permission</option>
                            <template x-for="p in filteredPermissions()" :key="p.ID">
                              <option :value="p.ID" x-text="permLabel(p.ID)"></option>
                            </template>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Object pattern</label>
                          <input class="bera-input bera-cell-mono" x-model="grantModal.form.Object" placeholder="account:demo/document:*" />
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Effect</label>
                          <select class="bera-select" x-model="grantModal.form.Effect">
                            <option value="allow">allow</option>
                            <option value="deny">deny</option>
                          </select>
                        </div>
                        <div class="bera-modal__foot">
                          <button type="button" class="bera-btn bera-btn--secondary" @click="grantModal.open = false">Cancel</button>
                          <button type="submit" class="bera-btn bera-btn--primary" :disabled="grantModal.saving" x-text="grantModal.saving ? 'Saving' : 'Save'"></button>
                        </div>
                      </form>
                    </div>
                  </div>
                </template>

                <!-- ---- grant delete confirm ---- -->
                <template x-if="confirm.open">
                  <div class="bera-scrim" @keydown.escape.window="confirm.open = false">
                    <div class="bera-modal__panel" style="max-width: 460px">
                      <h2 class="bera-modal__title">Revoke grant</h2>
                      <p class="bera-body">Delete grant <span class="bera-mono" x-text="confirm.grant.ID"></span> from account <span class="bera-mono" x-text="account"></span>?</p>
                      <template x-if="confirm.error">
                        <div class="bera-alert bera-alert--danger" style="margin-top: 16px">
                          <span class="bera-alert__code" x-text="confirm.error.code"></span>
                          <span x-text="confirm.error.msg"></span>
                        </div>
                      </template>
                      <div class="bera-modal__foot">
                        <button class="bera-btn bera-btn--secondary" @click="confirm.open = false">Cancel</button>
                        <button class="bera-btn bera-btn--primary" :disabled="confirm.saving" @click="doDeleteGrant()" x-text="confirm.saving ? 'Deleting' : 'Delete'"></button>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- ---- template editor modal ---- -->
                <template x-if="tmplModal.open">
                  <div class="bera-scrim" @keydown.escape.window="tmplModal.open = false">
                    <div class="bera-modal__panel" style="max-width: 1080px">
                      <h2 class="bera-modal__title" x-text="tmplModal.mode === 'create' ? 'New template' : 'Edit template'"></h2>
                      <p class="bera-caption" style="margin-bottom: 16px">
                        Parameters are referenced as <span class="bera-mono">${name}</span> in grant subjects and objects.
                      </p>
                      <template x-if="tmplModal.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="tmplModal.error.code"></span>
                          <span x-text="tmplModal.error.msg"></span>
                        </div>
                      </template>
                      <form @submit.prevent="saveTemplate()">
                        <div class="bera-field">
                          <label class="bera-label">Name</label>
                          <input class="bera-input bera-cell-mono" x-model="tmplModal.form.Name" :disabled="tmplModal.mode === 'edit'" placeholder="project-member" />
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Version</label>
                          <input class="bera-input" type="number" min="1" x-model.number="tmplModal.form.Version" />
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Description</label>
                          <textarea class="bera-textarea" x-model="tmplModal.form.Description"></textarea>
                        </div>

                        <label class="bera-label">Parameters</label>
                        <template x-for="(p, i) in tmplModal.form.Params" :key="i">
                          <div class="bera-toolbar" style="gap: 8px; margin-bottom: 8px">
                            <input class="bera-input bera-cell-mono" style="flex: 1" x-model="p.Name" placeholder="name" />
                            <select class="bera-select" style="width: auto" x-model="p.Type">
                              <option value="segment">segment</option>
                              <option value="string">string</option>
                            </select>
                            <input class="bera-input" style="flex: 1" x-model="p.Description" placeholder="description" />
                            <button type="button" class="bera-linkbtn bera-linkbtn--danger" @click="removeParam(i)">Remove</button>
                          </div>
                        </template>
                        <button type="button" class="bera-btn bera-btn--secondary" @click="addParam()" style="margin-bottom: 16px">Add parameter</button>

                        <label class="bera-label">Grants</label>
                        <template x-for="(g, i) in tmplModal.form.Grants" :key="i">
                          <div class="bera-toolbar" style="gap: 8px; margin-bottom: 8px; flex-wrap: wrap">
                            <select class="bera-select" style="width: auto" x-model="g.Subject.Kind">
                              <option value="principal">principal</option>
                              <option value="role">role</option>
                              <option value="group">group</option>
                            </select>
                            <input class="bera-input bera-cell-mono" style="flex: 1" x-model="g.Subject.ID" placeholder="${who}" />
                            <select class="bera-select" style="width: auto" x-model="g.PermissionID">
                              <option value="">permission</option>
                              <template x-for="p in refs.permissions" :key="p.ID">
                                <option :value="p.ID" x-text="p.ID"></option>
                              </template>
                            </select>
                            <input class="bera-input bera-cell-mono" style="flex: 1" x-model="g.Object" placeholder="account:${account}/document:*" />
                            <select class="bera-select" style="width: auto" x-model="g.Effect">
                              <option value="allow">allow</option>
                              <option value="deny">deny</option>
                            </select>
                            <button type="button" class="bera-linkbtn bera-linkbtn--danger" @click="removeTemplateGrant(i)">Remove</button>
                          </div>
                        </template>
                        <button type="button" class="bera-btn bera-btn--secondary" @click="addTemplateGrant()">Add grant</button>

                        <div class="bera-modal__foot">
                          <button type="button" class="bera-btn bera-btn--secondary" @click="tmplModal.open = false">Cancel</button>
                          <button type="submit" class="bera-btn bera-btn--primary" :disabled="tmplModal.saving" x-text="tmplModal.saving ? 'Saving' : 'Save template'"></button>
                        </div>
                      </form>
                    </div>
                  </div>
                </template>

                <!-- ---- template delete confirm ---- -->
                <template x-if="tmplConfirm.open">
                  <div class="bera-scrim" @keydown.escape.window="tmplConfirm.open = false">
                    <div class="bera-modal__panel" style="max-width: 460px">
                      <h2 class="bera-modal__title">Delete template</h2>
                      <p class="bera-body">Delete template <span class="bera-mono" x-text="tmplConfirm.tmpl.Name"></span> version <span class="bera-mono" x-text="tmplConfirm.tmpl.Version"></span>?</p>
                      <template x-if="tmplConfirm.error">
                        <div class="bera-alert bera-alert--danger" style="margin-top: 16px">
                          <span class="bera-alert__code" x-text="tmplConfirm.error.code"></span>
                          <span x-text="tmplConfirm.error.msg"></span>
                        </div>
                      </template>
                      <div class="bera-modal__foot">
                        <button class="bera-btn bera-btn--secondary" @click="tmplConfirm.open = false">Cancel</button>
                        <button class="bera-btn bera-btn--primary" :disabled="tmplConfirm.saving" @click="doDeleteTemplate()" x-text="tmplConfirm.saving ? 'Deleting' : 'Delete'"></button>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- ---- template apply modal (single + bulk, with preview) ---- -->
                <template x-if="apply.open">
                  <div class="bera-scrim" @keydown.escape.window="apply.open = false">
                    <div class="bera-modal__panel" style="max-width: 1080px">
                      <h2 class="bera-modal__title">
                        <span x-text="apply.mode === 'bulk' ? 'Bulk apply template' : 'Apply template'"></span>
                        <span class="bera-mono" x-text="apply.name + ' v' + apply.version"></span>
                      </h2>
                      <p class="bera-caption" style="margin-bottom: 16px">
                        Fill the parameters, review the expanded grants below, then apply.
                        <span x-show="apply.mode === 'single'">Apply is transactional — all grants land or none do.</span>
                        <span x-show="apply.mode === 'bulk'">Bulk provisioning writes every principal's grants in one atomic operation.</span>
                      </p>
                      <template x-if="apply.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="apply.error.code"></span>
                          <span x-text="apply.error.msg"></span>
                        </div>
                      </template>

                      <template x-if="apply.applied.length > 0">
                        <div class="bera-alert bera-alert--info">
                          <span>Applied <span x-text="apply.applied.length"></span> grant(s) to account <span class="bera-mono" x-text="apply.targetAccount"></span>.</span>
                        </div>
                      </template>

                      <div class="bera-field">
                        <label class="bera-label">Target account</label>
                        <input class="bera-input bera-cell-mono" x-model="apply.targetAccount" @input="recomputePreview()" />
                      </div>
                      <div class="bera-field">
                        <label class="bera-label">Grant id prefix (optional)</label>
                        <input class="bera-input bera-cell-mono" x-model="apply.prefix" @input="recomputePreview()" :placeholder="apply.name + '-v' + apply.version" />
                      </div>

                      <!-- bulk: pick the per-principal parameter + the principals -->
                      <template x-if="apply.mode === 'bulk'">
                        <div>
                          <div class="bera-field">
                            <label class="bera-label">Per-principal parameter</label>
                            <select class="bera-select" x-model="apply.subjectParam" @change="recomputePreview()">
                              <template x-for="p in (apply.template.Params || [])" :key="p.Name">
                                <option :value="p.Name" x-text="p.Name"></option>
                              </template>
                            </select>
                            <p class="bera-field__hint">This parameter is filled with each selected principal's id.</p>
                          </div>
                          <div class="bera-field">
                            <label class="bera-label">Principals to provision</label>
                            <div class="bera-transfer" x-data="transferList({
                              items: () => refs.principals.map((p) => ({ value: p.ID, label: p.ID })),
                              has: (v) => apply.principals.includes(v),
                              toggle: (v) => toggleBulkPrincipal(v),
                            })">
                              <div class="bera-transfer__pane">
                                <div class="bera-transfer__head">
                                  <span class="bera-transfer__title">Available</span>
                                  <button type="button" class="bera-linkbtn" x-show="available.length" @click="addAll()" x-text="'Add all (' + available.length + ')'"></button>
                                </div>
                                <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="availQuery" />
                                <ul class="bera-transfer__list">
                                  <template x-if="available.length === 0">
                                    <li class="bera-transfer__empty" x-text="totalCount === 0 ? 'No principals available.' : 'Nothing to add.'"></li>
                                  </template>
                                  <template x-for="o in available" :key="o.value">
                                    <li class="bera-transfer__item" @click="pick(o.value)" :title="o.label">
                                      <span class="bera-cell-mono" x-text="o.label"></span>
                                      <span class="bera-transfer__op" aria-hidden="true">+</span>
                                    </li>
                                  </template>
                                </ul>
                              </div>
                              <div class="bera-transfer__pane">
                                <div class="bera-transfer__head">
                                  <span class="bera-transfer__title">To provision <span class="bera-transfer__count" x-text="selectedCount"></span></span>
                                  <button type="button" class="bera-linkbtn" x-show="chosen.length" @click="removeAll()" x-text="'Clear (' + chosen.length + ')'"></button>
                                </div>
                                <input type="search" class="bera-input bera-transfer__filter" placeholder="Filter…" x-model="selQuery" />
                                <ul class="bera-transfer__list">
                                  <template x-if="chosen.length === 0">
                                    <li class="bera-transfer__empty" x-text="selectedCount === 0 ? 'None selected yet.' : 'No match.'"></li>
                                  </template>
                                  <template x-for="o in chosen" :key="o.value">
                                    <li class="bera-transfer__item bera-transfer__item--on" @click="pick(o.value)" :title="o.label">
                                      <span class="bera-transfer__op" aria-hidden="true">×</span>
                                      <span class="bera-cell-mono" x-text="o.label"></span>
                                    </li>
                                  </template>
                                </ul>
                              </div>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- the remaining declared parameters -->
                      <template x-for="p in (apply.template.Params || [])" :key="p.Name">
                        <div class="bera-field" x-show="!(apply.mode === 'bulk' && p.Name === apply.subjectParam)">
                          <label class="bera-label" x-text="p.Name + ' (' + p.Type + ')'"></label>
                          <input class="bera-input bera-cell-mono" x-model="apply.params[p.Name]" @input="recomputePreview()" :placeholder="p.Description || p.Name" />
                        </div>
                      </template>

                      <label class="bera-label" style="margin-top: 12px">Preview — would-be grants</label>
                      <template x-if="apply.preview.length === 0">
                        <p class="bera-caption">Fill the parameters to preview the expanded grants.</p>
                      </template>
                      <template x-if="apply.preview.length > 0">
                        <div class="bera-table-wrap">
                          <table class="bera-table">
                            <thead><tr><th>Id</th><th>Subject</th><th>Permission</th><th>Object</th><th>Effect</th></tr></thead>
                            <tbody>
                              <template x-for="(g, i) in apply.preview" :key="i">
                                <tr>
                                  <td class="bera-cell-mono" x-text="g.ID"></td>
                                  <td class="bera-cell-mono" x-text="g.Subject.Kind + ':' + g.Subject.ID"></td>
                                  <td class="bera-cell-mono" x-text="g.PermissionID"></td>
                                  <td class="bera-cell-mono" x-text="g.Object"></td>
                                  <td><span class="bera-badge" :class="'bera-badge--' + g.Effect" x-text="g.Effect"></span></td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>
                      </template>

                      <div class="bera-modal__foot">
                        <button type="button" class="bera-btn bera-btn--secondary" @click="apply.open = false">Close</button>
                        <button
                          type="button"
                          class="bera-btn bera-btn--primary"
                          :disabled="apply.applying || apply.preview.length === 0"
                          @click="applyTemplate()"
                          x-text="apply.applying ? 'Applying' : (apply.mode === 'bulk' ? 'Provision ' + apply.principals.length + ' principal(s)' : 'Apply template')"
                        ></button>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- ---- bestow modal ---- -->
                <template x-if="bestow.open">
                  <div class="bera-scrim" @keydown.escape.window="bestow.open = false">
                    <div class="bera-modal__panel">
                      <h2 class="bera-modal__title">Bestow a delegated grant</h2>
                      <p class="bera-caption" style="margin-bottom: 16px">
                        You are handing a subset of your own authority to another principal, scoped to
                        account <span class="bera-mono" x-text="account"></span>. Narrow the object to a
                        more-specific pattern than the held grant.
                      </p>
                      <template x-if="bestow.error">
                        <div class="bera-alert bera-alert--danger">
                          <span class="bera-alert__code" x-text="bestow.error.code"></span>
                          <span x-text="bestow.error.msg"></span>
                        </div>
                      </template>
                      <form @submit.prevent="doBestow()">
                        <div class="bera-field">
                          <label class="bera-label">From held grant</label>
                          <select class="bera-select" x-model="bestow.selectedHeldId" @change="onSelectHeld()">
                            <option value="">Select one of your delegatable grants</option>
                            <template x-for="g in eligibleHeld()" :key="g.ID">
                              <option :value="g.ID" x-text="g.ID + ' — ' + permLabel(g.PermissionID) + ' over ' + g.Object"></option>
                            </template>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">New grant id</label>
                          <input class="bera-input bera-cell-mono" x-model="bestow.form.ID" placeholder="g-bob-atlas" />
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Grantee kind</label>
                          <select class="bera-select" x-model="bestow.form.Subject.Kind">
                            <option value="principal">principal</option>
                            <option value="role">role</option>
                            <option value="group">group</option>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Grantee</label>
                          <select class="bera-select" x-model="bestow.form.Subject.ID">
                            <option value="">Select a grantee</option>
                            <template x-for="o in subjectOptions(bestow.form.Subject.Kind)" :key="o.ID">
                              <option :value="o.ID" x-text="o.ID + (o.Name ? ' (' + o.Name + ')' : '')"></option>
