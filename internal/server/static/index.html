                            </template>
                          </select>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Permission</label>
                          <input class="bera-input bera-cell-mono" :value="permLabel(bestow.form.PermissionID)" disabled />
                          <p class="bera-field__hint">Inherited from the held grant — a bestow may only hand on the same permission.</p>
                        </div>
                        <div class="bera-field">
                          <label class="bera-label">Object pattern</label>
                          <input class="bera-input bera-cell-mono" x-model="bestow.form.Object" placeholder="account:demo/project:atlas/document:42" />
                        </div>
                        <div class="bera-modal__foot">
                          <button type="button" class="bera-btn bera-btn--secondary" @click="bestow.open = false">Cancel</button>
                          <button type="submit" class="bera-btn bera-btn--primary" :disabled="bestow.saving" x-text="bestow.saving ? 'Bestowing' : 'Bestow'"></button>
                        </div>
                      </form>
                    </div>
                  </div>
                </template>

                <!-- ---- revoke confirm ---- -->
                <template x-if="revokeConfirm.open">
                  <div class="bera-scrim" @keydown.escape.window="revokeConfirm.open = false">
                    <div class="bera-modal__panel" style="max-width: 460px">
                      <h2 class="bera-modal__title">Revoke delegated grant</h2>
                      <p class="bera-body">Revoke grant <span class="bera-mono" x-text="revokeConfirm.grant.ID"></span>? Revoke enforces the same authority as bestow.</p>
                      <template x-if="revokeConfirm.error">
                        <div class="bera-alert bera-alert--danger" style="margin-top: 16px">
                          <span class="bera-alert__code" x-text="revokeConfirm.error.code"></span>
                          <span x-text="revokeConfirm.error.msg"></span>
                        </div>
                      </template>
                      <div class="bera-modal__foot">
                        <button class="bera-btn bera-btn--secondary" @click="revokeConfirm.open = false">Cancel</button>
                        <button class="bera-btn bera-btn--primary" :disabled="revokeConfirm.saving" @click="doRevoke()" x-text="revokeConfirm.saving ? 'Revoking' : 'Revoke'"></button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Graph (E8): a force-directed map of the whole model. Its own Alpine
               scope; the canvas is driven by graph.js's self-contained sim. -->
          <div x-show="active === 'graph'" x-data="graph()">
            <div class="bera-section-head">
              <h1 class="bera-h3">Graph</h1>
              <span class="bera-caption" x-show="ready">
                <span x-text="counts.nodes"></span> nodes ·
                <span x-text="counts.edges"></span> edges
              </span>
            </div>

            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to visualize the model.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>
                <template x-if="loading">
                  <p class="bera-body bera-muted">Loading model.</p>
                </template>

                <div class="bera-graph-toolbar" x-show="ready">
                  <input class="bera-input" style="width: 180px" x-model="search" placeholder="Search nodes…" />
                  <select class="bera-select" style="width: auto" x-model="accountFilter">
                    <option value="">All accounts</option>
                    <template x-for="a in accountList" :key="a"><option :value="a" x-text="a"></option></template>
                  </select>
                  <span class="bera-graph-sep"></span>
                  <label class="bera-graph-toggle"><input type="checkbox" x-model="layers.accounts" /> Accounts</label>
                  <label class="bera-graph-toggle"><input type="checkbox" x-model="layers.objects" /> Objects</label>
                  <label class="bera-graph-toggle"><input type="checkbox" x-model="layers.permissions" /> Permissions</label>
                  <label class="bera-graph-toggle"><input type="checkbox" x-model="layers.templates" /> Templates</label>
                  <span class="bera-graph-sep"></span>
                  <label class="bera-graph-toggle" title="Reachability honors membership enforcement (non-members are fenced out)">
                    <input type="checkbox" x-model="enforcement" /> Enforce membership
                  </label>
                  <span class="bera-toolbar__spacer" style="flex:1"></span>
                  <button class="bera-btn bera-btn--secondary" @click="resetView()">Reset view</button>
                  <button class="bera-btn bera-btn--secondary" @click="load()">Reload</button>
                </div>

                <div class="bera-graph-stage" x-show="ready">
                  <div class="bera-graph-canvas-wrap">
                    <canvas x-ref="canvas" class="bera-graph-canvas"></canvas>
                    <!-- Legend -->
                    <div class="bera-graph-legend">
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#10b981"></span>Principal</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#f59e0b"></span>Role</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#ec4899"></span>Group</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#6366f1"></span>Account</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#38bdf8"></span>Object</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot" style="background:#a78bfa"></span>Permission</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-dot bera-graph-dot--ring"></span>Wildcard (*)</div>
                      <div class="bera-graph-legend__sep"></div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-line"></span>Allow</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-line bera-graph-line--dash"></span>Deny</div>
                      <div class="bera-graph-legend__row"><span class="bera-graph-line bera-graph-line--dot"></span>Delegate</div>
                    </div>
                  </div>

                  <!-- Side panel: selected node detail + reachability control. -->
                  <div class="bera-graph-panel">
                    <template x-if="!selected">
                      <div class="bera-graph-panel__empty">
                        <p class="bera-body bera-muted">Click a node for detail. Drag to move, scroll to zoom, drag the background to pan.</p>
                        <p class="bera-caption">Pick a principal and hit <em>Trace reach</em> to light up everything it can access.</p>
                      </div>
                    </template>
                    <template x-if="selected">
                      <div>
                        <div class="bera-graph-panel__head">
                          <span class="bera-badge" x-text="selected.type"></span>
                          <h3 class="bera-h4" x-text="selected.title" style="margin:4px 0 0"></h3>
                        </div>
                        <dl class="bera-graph-kv">
                          <template x-for="row in selected.rows" :key="row[0]">
                            <div class="bera-graph-kv__row">
                              <dt x-text="row[0]"></dt>
                              <dd class="bera-mono" style="white-space:pre-wrap" x-text="row[1]"></dd>
                            </div>
                          </template>
                        </dl>
                        <div class="bera-graph-panel__actions" x-show="selected.canReach">
                          <button class="bera-btn bera-btn--primary" @click="focusReach()" x-show="reachId !== 'principal ' + selected.id">Trace reach</button>
                          <button class="bera-btn bera-btn--secondary" @click="clearReach()" x-show="reachId">Clear trace</button>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- Audit viewer (E6-S4): a read-only queryable table over the append-
               only audit trail. Its own Alpine scope over the Twirp facade. -->
          <div x-show="active === 'audit'" x-data="audit()">
            <div class="bera-section-head">
              <h1 class="bera-h3">Audit</h1>
              <span class="bera-caption" x-show="account">
                Account <span class="bera-mono" x-text="account"></span>
              </span>
            </div>

            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to query the audit trail.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <template x-if="tierChecked && !canRead">
                  <div class="bera-alert bera-alert--info">
                    <span>
                      You are signed in as <span class="bera-mono" x-text="principal"></span>.
                      Reading the audit trail requires system-admin authority (the whole trail) or
                      account-admin authority (this account only); you have neither, so the trail is
                      empty for you.
                    </span>
                  </div>
                </template>
                <template x-if="tierChecked && !canReadAll && canReadAccount">
                  <div class="bera-alert bera-alert--info">
                    <span>
                      As an account-admin you see only events scoped to account
                      <span class="bera-mono" x-text="account"></span>.
                    </span>
                  </div>
                </template>

                <div class="bera-toolbar" style="flex-wrap: wrap; gap: 8px">
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Actor</label>
                    <input class="bera-input bera-cell-mono" style="width: 160px" x-model="filter.actor" placeholder="principal id" @keydown.enter="load()" />
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Event type</label>
                    <select class="bera-select" style="width: auto" x-model="filter.eventType">
                      <option value="">All</option>
                      <template x-for="t in eventTypes" :key="t"><option :value="t" x-text="t"></option></template>
                    </select>
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Outcome</label>
                    <select class="bera-select" style="width: auto" x-model="filter.outcome">
                      <option value="">All</option>
                      <template x-for="o in outcomes" :key="o"><option :value="o" x-text="o"></option></template>
                    </select>
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Since</label>
                    <input class="bera-input" type="datetime-local" x-model="filter.since" />
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Until</label>
                    <input class="bera-input" type="datetime-local" x-model="filter.until" />
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Limit</label>
                    <input class="bera-input" type="number" min="1" style="width: 90px" x-model.number="filter.limit" />
                  </div>
                  <div class="bera-toolbar__spacer"></div>
                  <template x-if="accounts.length > 1">
                    <select class="bera-select" style="width: auto" x-model="account" @change="onAccountChange()">
                      <template x-for="a in accounts" :key="a.ID">
                        <option :value="a.ID" x-text="a.Name || a.ID"></option>
                      </template>
                    </select>
                  </template>
                  <button class="bera-btn bera-btn--secondary" @click="resetFilter()">Reset</button>
                  <button class="bera-btn bera-btn--primary" @click="load()">Query</button>
                </div>

                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>

                <template x-if="loading">
                  <p class="bera-body bera-muted">Loading.</p>
                </template>

                <template x-if="!loading && !error && rows.length === 0">
                  <div class="bera-empty"><p class="bera-body">No audit events match this query.</p></div>
                </template>

                <template x-if="!loading && rows.length > 0">
                  <div class="bera-table-wrap">
                    <table class="bera-table">
                      <thead>
                        <tr>
                          <th>Time</th><th>Type</th><th>Action</th><th>Actor (real)</th>
                          <th>Effective subject</th><th>Account</th><th>Target</th><th>Outcome</th><th>Reason</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="ev in rows" :key="ev.ID">
                          <tr>
                            <td class="bera-cell-mono" x-text="when(ev)"></td>
                            <td><span class="bera-badge" x-text="ev.EventType"></span></td>
                            <td class="bera-cell-mono" x-text="dash(ev.Action)"></td>
                            <td class="bera-cell-mono" x-text="dash(ev.Actor)"></td>
                            <td class="bera-cell-mono" x-text="effectiveText(ev)"></td>
                            <td class="bera-cell-mono" x-text="dash(ev.Account)"></td>
                            <td class="bera-cell-mono" x-text="dash(ev.Target)"></td>
                            <td><span class="bera-badge" :class="outcomeClass(ev)" x-text="ev.Outcome"></span></td>
                            <td x-text="dash(ev.Reason)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- What-if simulator (E6-S4): a read-only decision against the LIVE
               model plus its full Explain trace. Its own Alpine scope. -->
          <div x-show="active === 'whatif'" x-data="whatif()">
            <div class="bera-section-head">
              <h1 class="bera-h3">What-if</h1>
              <span class="bera-caption" x-show="account">
                Account <span class="bera-mono" x-text="account"></span>
              </span>
            </div>

            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to simulate a decision.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <p class="bera-caption" style="margin: 0 0 12px">
                  Ask whether a principal would be allowed an action on an object, against the live
                  model. This runs Check and Explain — read-only, no mutation.
                </p>

                <div class="bera-toolbar" style="flex-wrap: wrap; gap: 8px; align-items: flex-end">
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Principal</label>
                    <input class="bera-input bera-cell-mono" style="width: 160px" x-model="form.principal" placeholder="alice" @keydown.enter="run()" />
                  </div>
                  <div class="bera-field" style="margin: 0">
                    <label class="bera-label">Action</label>
                    <input class="bera-input bera-cell-mono" style="width: 160px" x-model="form.action" placeholder="read" @keydown.enter="run()" />
                  </div>
                  <div class="bera-field" style="margin: 0; flex: 1; min-width: 240px">
                    <label class="bera-label">Object</label>
                    <input class="bera-input bera-cell-mono" x-model="form.object" placeholder="account:demo/document:42" @keydown.enter="run()" />
                  </div>
                  <template x-if="accounts.length > 1">
                    <div class="bera-field" style="margin: 0">
                      <label class="bera-label">Account</label>
                      <select class="bera-select" style="width: auto" x-model="account">
                        <template x-for="a in accounts" :key="a.ID">
                          <option :value="a.ID" x-text="a.Name || a.ID"></option>
                        </template>
                      </select>
                    </div>
                  </template>
                  <button class="bera-btn bera-btn--primary" :disabled="running" @click="run()" x-text="running ? 'Running' : 'Simulate'"></button>
                </div>

                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>

                <!-- verdict -->
                <template x-if="ran && decision">
                  <div class="bera-alert" :class="decision.allow ? 'bera-alert--success' : 'bera-alert--danger'" style="margin-top: 16px">
                    <span class="bera-alert__code" x-text="decision.allow ? 'ALLOW' : 'DENY'"></span>
                    <span x-text="decision.reason"></span>
                  </div>
                </template>

                <template x-if="ran && decidingIds().length > 0">
                  <p class="bera-caption" style="margin-top: 8px">
                    Deciding grants:
                    <template x-for="(id, i) in decidingIds()" :key="id">
                      <span><span class="bera-mono" x-text="id"></span><span x-show="i < decidingIds().length - 1">, </span></span>
                    </template>
                  </p>
                </template>

                <!-- trace -->
                <template x-if="ran && trace">
                  <div style="margin-top: 20px">
                    <div class="bera-section-head" style="margin-bottom: 8px">
                      <h2 class="bera-h4">Explain trace</h2>
                      <span class="bera-caption">Max specificity <span class="bera-mono" x-text="trace.MaxSpecificity"></span></span>
                    </div>

                    <p class="bera-caption" style="margin-bottom: 8px">
                      Expanded subject set:
                      <template x-for="(s, i) in subjects()" :key="i">
                        <span><span class="bera-mono" x-text="subjectText(s)"></span><span x-show="i < subjects().length - 1">, </span></span>
                      </template>
                      <span x-show="subjects().length === 0" class="bera-muted">none</span>
                    </p>

                    <template x-if="considered().length === 0">
                      <div class="bera-empty"><p class="bera-body">No grants were considered for this subject set.</p></div>
                    </template>

                    <template x-if="considered().length > 0">
                      <div class="bera-table-wrap">
                        <table class="bera-table">
                          <thead>
                            <tr>
                              <th>Grant</th><th>Subject</th><th>Permission</th><th>Effect</th><th>Object pattern</th>
                              <th>Action</th><th>Strategy</th><th>Action match</th><th>Covered</th><th>Specificity</th>
                              <th>Deciding</th><th>Outcome</th>
                            </tr>
                          </thead>
                          <tbody>
                            <template x-for="(g, i) in considered()" :key="g.GrantID + '-' + i">
                              <tr :class="g.Deciding ? 'bera-row--active' : ''">
                                <td class="bera-cell-mono" x-text="dash(g.GrantID)"></td>
                                <td class="bera-cell-mono" x-text="subjectText(g.Subject)"></td>
                                <td class="bera-cell-mono" x-text="dash(g.PermissionID)"></td>
                                <td><span class="bera-badge" :class="'bera-badge--' + g.Effect" x-text="g.Effect"></span></td>
                                <td class="bera-cell-mono" x-text="dash(g.ObjectPattern)"></td>
                                <td class="bera-cell-mono" x-text="dash(g.Action)"></td>
                                <td class="bera-cell-mono" x-text="dash(g.Strategy)"></td>
                                <td x-text="yesno(g.ActionMatched)"></td>
                                <td x-text="yesno(g.Covered)"></td>
                                <td class="bera-cell-mono" x-text="g.Specificity"></td>
                                <td x-text="yesno(g.Deciding)"></td>
                                <td x-text="dash(g.Outcome)"></td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Import / export (E6-S4): download the declarative model file, or
               upload one with a preview diff before applying. Own Alpine scope. -->
          <div x-show="active === 'portability'" x-data="portability()">
            <div class="bera-section-head">
              <h1 class="bera-h3">Import / export</h1>
              <span class="bera-caption" x-show="account">
                Account <span class="bera-mono" x-text="account"></span>
              </span>
            </div>

            <template x-if="!principal">
              <div class="bera-empty">
                <p class="bera-body">Sign in to export or import the model.</p>
              </div>
            </template>

            <template x-if="principal">
              <div>
                <template x-if="tierChecked && !canManage">
                  <div class="bera-alert bera-alert--info">
                    <span>
                      You are signed in as <span class="bera-mono" x-text="principal"></span>.
                      Exporting and importing the declarative model requires system-admin authority.
                      The server is the source of truth and will reject an unauthorised action.
                    </span>
                  </div>
                </template>

                <template x-if="error">
                  <div class="bera-alert bera-alert--danger">
                    <span class="bera-alert__code" x-text="error.code"></span>
                    <span x-text="error.msg"></span>
                  </div>
                </template>

                <!-- EXPORT -->
                <div class="bera-card" style="margin-bottom: 20px">
                  <h2 class="bera-h4">Export</h2>
                  <p class="bera-caption" style="margin: 4px 0 12px">
                    Download the whole model — every RBAC entity, grants, templates and rules — as one
                    canonical JSON document. Live host object metadata is deliberately excluded.
                  </p>
                  <button class="bera-btn bera-btn--primary" :disabled="loading" @click="exportModel()" x-text="loading ? 'Working' : 'Export model'"></button>
                  <template x-if="exportSummary.length > 0">
                    <div class="bera-table-wrap" style="margin-top: 12px">
                      <table class="bera-table">
                        <thead><tr><th>Collection</th><th style="text-align: right">Count</th></tr></thead>
                        <tbody>
                          <template x-for="s in exportSummary" :key="s.label">
                            <tr><td x-text="s.label"></td><td class="bera-cell-mono" style="text-align: right" x-text="s.count"></td></tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                </div>

                <!-- IMPORT -->
                <div class="bera-card">
                  <h2 class="bera-h4">Import</h2>
                  <p class="bera-caption" style="margin: 4px 0 12px">
                    Upload a declarative model file. Import is an idempotent, transactional upsert — it
                    adds or updates every entity in the file and never deletes. Review the preview diff
                    below, then apply.
                  </p>
                  <input class="bera-input" type="file" accept="application/json,.json" @change="onFile($event)" />

                  <template x-if="importError">
                    <div class="bera-alert bera-alert--danger" style="margin-top: 12px">
                      <span class="bera-alert__code" x-text="importError.code"></span>
                      <span x-text="importError.msg"></span>
                    </div>
                  </template>

                  <template x-if="importDone">
                    <div class="bera-alert bera-alert--success" style="margin-top: 12px">
                      <span class="bera-alert__code">APPLIED</span>
                      <span>Import applied. The preview is now empty because the model matches the file.</span>
                    </div>
                  </template>

                  <!-- preview diff -->
                  <template x-if="diff">
                    <div style="margin-top: 16px">
                      <p class="bera-body">
                        Preview for <span class="bera-mono" x-text="importFile"></span>:
                        <span class="bera-badge bera-badge--allow" x-text="diff.totalAdded + ' to add'"></span>
                        <span class="bera-badge" x-text="diff.totalChanged + ' to change'"></span>
                      </p>
                      <template x-if="diff.empty">
                        <p class="bera-caption">No changes — the uploaded file matches the current model (import would be a no-op).</p>
                      </template>

                      <template x-for="grp in diff.groups" :key="grp.key">
                        <div x-show="grp.added.length > 0 || grp.changed.length > 0" style="margin-top: 12px">
                          <label class="bera-label" x-text="grp.label"></label>
                          <div class="bera-table-wrap">
                            <table class="bera-table">
                              <thead><tr><th>Change</th><th>Key</th></tr></thead>
                              <tbody>
                                <template x-for="a in grp.added" :key="'a-' + a.key">
                                  <tr><td><span class="bera-badge bera-badge--allow">add</span></td><td class="bera-cell-mono" x-text="a.key"></td></tr>
                                </template>
                                <template x-for="c in grp.changed" :key="'c-' + c.key">
                                  <tr><td><span class="bera-badge bera-badge--deny">change</span></td><td class="bera-cell-mono" x-text="c.key"></td></tr>
                                </template>
                              </tbody>
                            </table>
                          </div>
                          <p class="bera-caption" x-show="grp.retained > 0" style="margin-top: 4px">
                            <span class="bera-mono" x-text="grp.retained"></span> existing entr(ies) not in the file are retained (import never deletes).
                          </p>
                        </div>
                      </template>

                      <div class="bera-modal__foot" style="margin-top: 16px">
                        <button class="bera-btn bera-btn--secondary" @click="resetImport()">Clear</button>
                        <button class="bera-btn bera-btn--primary" :disabled="importing || diff.empty" @click="applyImport()" x-text="importing ? 'Applying' : 'Apply import'"></button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- Rules (E7-S2): the Blueprints-style node editor over the E2-S3
               pulse-expression rule AST. The palette adds AST nodes; typed
               sockets wire them; the canvas pans/zooms/reroutes. The graph is
               serialized to and from the exact rules.Node JSON by the pure
               serializer (js/rules-serializer.js) — there is no second format.
               window.blueprintEditor exposes toAST/fromAST/validate for E7-S3. -->
          <template x-if="active === 'rules'">
            <div x-data="rules()">
              <div class="bera-section-head">
                <h1 class="bera-h3">Rules</h1>
                <span class="bera-caption">Node editor · pulse-expression AST</span>
              </div>
              <p class="bera-caption" style="margin: 0 0 12px">
                Build a rule as a graph of nodes over object metadata and the
                principal, account and action context. The graph serializes to
                the same rule AST the engine evaluates and the state file
                persists — the editor is a view over that one format. Structural
                checks run here as you edit; full type-checking runs on the
                server when you save (<span class="bera-mono">E7-S3</span>).
              </p>

              <template x-if="error">
                <div class="bera-alert bera-alert--danger">
                  <span class="bera-alert__code">RULE</span>
                  <span x-text="error"></span>
                </div>
              </template>

              <!-- Load / save / validate toolbar. Editing is SYSTEM tier: the Save
                   button is shown only to a system-admin (canEdit, probed via the
                   open Check RPC); a non-admin still loads, validates and previews.
                   Server validation and save surface their APERTURE_* code + msg. -->
              <div class="bera-card" style="padding: 12px; margin-bottom: 12px">
                <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end">
                  <div class="bera-field">
                    <label class="bera-label" for="rule-name">Rule name</label>
                    <input class="bera-input bera-mono" id="rule-name" type="text" autocomplete="off"
                           placeholder="quarantine-rule" x-model="ruleName" />
                  </div>
                  <div class="bera-field">
                    <label class="bera-label" for="rule-load">Load existing</label>
                    <select class="bera-input" id="rule-load" @change="loadRule($event.target.value); $event.target.value=''">
                      <option value="">Select a rule…</option>
                      <template x-for="r in ruleList" :key="r.Name">
                        <option :value="r.Name" x-text="r.Name"></option>
                      </template>
                    </select>
                  </div>
                  <div style="display: flex; gap: 8px">
                    <button type="button" class="bera-btn bera-btn--secondary"
                            @click="serverValidate()" :disabled="validating || booting"
                            x-text="validating ? 'Validating…' : 'Validate'"></button>
                    <button type="button" class="bera-btn bera-btn--primary"
                            x-show="canEdit" @click="save()" :disabled="saving || booting"
                            x-text="saving ? 'Saving…' : 'Save'"></button>
                  </div>
                </div>
                <div class="bera-field" style="margin-top: 12px">
                  <label class="bera-label" for="rule-desc">Description</label>
                  <input class="bera-input" id="rule-desc" type="text" autocomplete="off"
                         placeholder="Optional documentation" x-model="description" />
                </div>
                <p class="bera-caption" x-show="tierChecked && !canEdit" style="margin: 8px 0 0">
                  You are signed in as a non-admin: you can load, validate and preview
                  rules, but saving requires system-admin authority.
                </p>
                <template x-if="status">
                  <div class="bera-alert" :class="status.kind === 'ok' ? 'bera-alert--success' : 'bera-alert--danger'"
                       style="margin-top: 12px">
                    <span class="bera-alert__code" x-text="status.code || (status.kind === 'ok' ? 'OK' : 'RULE')"></span>
                    <span x-text="status.msg"></span>
                  </div>
                </template>
              </div>

              <div class="bera-rule-editor" style="display: grid; grid-template-columns: 200px 1fr; gap: 12px; align-items: start">
                <!-- Palette -->
                <div class="bera-card" style="padding: 12px">
                  <p class="bera-label" style="margin-bottom: 8px">Palette</p>
                  <template x-for="grp in palette" :key="grp.group">
                    <div style="margin-bottom: 12px">
                      <p class="bera-caption" style="margin: 0 0 6px" x-text="grp.group"></p>
                      <div style="display: flex; flex-direction: column; gap: 6px">
                        <template x-for="item in grp.items" :key="item.kind">
                          <button
                            type="button"
                            class="bera-btn bera-btn--secondary"
                            style="justify-content: flex-start"
                            @click="add(item.kind)"
                            x-text="item.label"
                          ></button>
                        </template>
                      </div>
                    </div>
                  </template>
                  <div style="display: flex; flex-direction: column; gap: 6px; margin-top: 8px; border-top: 1px solid var(--color-border); padding-top: 12px">
                    <button type="button" class="bera-btn bera-btn--secondary" @click="zoomToFit()">Fit to view</button>
                    <button type="button" class="bera-btn bera-btn--secondary" @click="clearCanvas()">Clear canvas</button>
                  </div>
                </div>

                <!-- Canvas + validation -->
                <div>
                  <div class="bera-card" style="padding: 0; overflow: hidden">
                    <div
                      x-ref="canvas"
                      class="rete-canvas"
                      style="position: relative; width: 100%; height: 480px; background: var(--color-surface-2)"
                    >
                      <template x-if="booting">
                        <p class="bera-caption" style="padding: 16px">Loading the canvas.</p>
                      </template>
                    </div>
                  </div>

                  <!-- Inline structural validation (client-side; AST shape + unknown
                       variable roots). Full validation is the engine's, in E7-S3. -->
                  <div style="margin-top: 12px">
                    <template x-if="!booting && valid">
                      <p class="bera-caption" style="margin: 0; color: var(--color-success, var(--neutral-700))">
                        The rule is structurally valid. Server validation runs on save.
                      </p>
                    </template>
                    <template x-if="!booting && !valid && problems.length">
                      <div class="bera-card" style="padding: 12px">
                        <p class="bera-label" style="margin-bottom: 8px">Validation</p>
                        <ul style="margin: 0; padding-left: 16px; display: flex; flex-direction: column; gap: 4px">
                          <template x-for="(p, i) in problems" :key="i">
                            <li class="bera-caption">
                              <span class="bera-mono" x-text="p.code"></span>
                              <span x-text="' · ' + p.path + ' — ' + p.message"></span>
                            </li>
                          </template>
                        </ul>
                      </div>
                    </template>
                  </div>

                  <!-- Object what-if preview (READ-ONLY). Evaluates the rule
                       CURRENTLY on the canvas against a sample object's provider
                       metadata and shows the boolean result. No account /
                       principal / grant — the rule reads only object.*, so the
                       author sees it fire (or not) directly. Nothing is saved. -->
                  <div class="bera-card" style="padding: 12px; margin-top: 12px">
                    <p class="bera-label" style="margin-bottom: 4px">Object what-if preview</p>
                    <p class="bera-caption" style="margin: 0 0 12px">
                      Read-only. Pick an object type and a sample object; the rule on
                      the canvas is evaluated against that object's data — without saving.
                    </p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end">
                      <div class="bera-field">
                        <label class="bera-label" for="rule-wi-type">Object type</label>
                        <select class="bera-input" id="rule-wi-type"
                                x-model="preview.objectType" @change="loadPreviewObjects()">
                          <option value="">Select a type…</option>
                          <template x-for="t in objectTypes" :key="t">
                            <option :value="t" x-text="t"></option>
                          </template>
                        </select>
                      </div>
                      <div class="bera-field">
                        <label class="bera-label" for="rule-wi-object">Object</label>
                        <select class="bera-input bera-mono" id="rule-wi-object"
                                x-model="preview.objectId" :disabled="!preview.objects.length">
                          <option value="">Select an object…</option>
                          <template x-for="o in preview.objects" :key="o">
                            <option :value="o" x-text="o"></option>
                          </template>
                        </select>
                      </div>
                      <button type="button" class="bera-btn bera-btn--secondary"
                              @click="runPreview()" :disabled="previewing || booting || !preview.objectId"
                              x-text="previewing ? 'Running…' : 'Evaluate'"></button>
                    </div>

                    <template x-if="previewError">
                      <div class="bera-alert bera-alert--danger" style="margin-top: 12px">
                        <span class="bera-alert__code" x-text="previewError.code"></span>
                        <span x-text="previewError.msg"></span>
                      </div>
                    </template>

                    <template x-if="previewResult !== null">
                      <div style="margin-top: 12px">
                        <p class="bera-caption" style="margin: 0 0 4px">
                          Rule result for <span class="bera-mono" x-text="preview.objectId"></span>:
                          <strong x-text="previewResult ? 'true (selected)' : 'false (not selected)'"
                                  :style="previewResult ? 'color: var(--color-success, var(--neutral-700))' : 'color: var(--color-danger, var(--neutral-700))'"></strong>
                        </p>
                        <template x-if="previewObject">
                          <p class="bera-caption bera-mono" style="margin: 4px 0 0; word-break: break-all"
                             x-text="'object = ' + JSON.stringify(previewObject)"></p>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </main>
      </div>

      <!-- Sign-in affordance: shown when no dev bearer is present. Auth is
           external — this only names which principal the dev session presents. -->
      <template x-if="!signedIn">
        <div class="bera-scrim">
          <form class="bera-signin" @submit.prevent="signIn()">
            <h2 class="bera-signin__title">Sign in</h2>
            <p class="bera-signin__hint">
              Aperture consumes external credentials; it never issues them. For
              local and demo use the dev authenticator, where the bearer is the
              principal id. Enter a principal id to continue.
            </p>
            <label class="bera-label" for="signin-id">Principal id</label>
            <input
              class="bera-input"
              id="signin-id"
              type="text"
              autocomplete="off"
              placeholder="alice"
              x-model="signInId"
            />
            <div class="bera-signin__row">
              <button class="bera-btn bera-btn--primary" type="submit">Continue</button>
            </div>
          </form>
        </div>
      </template>
    </div>
  </body>
</html>
